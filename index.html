<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Barback Tip-Out</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Tip-Out">

<style>
body {
    font-family: Arial;
    padding: 20px;
    background: #f4f4f4;
}
.box {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
}
button {
    width: 100%;
    padding: 12px;
    font-size: 18px;
    background: black;
    color: white;
    border: none;
    border-radius: 8px;
    margin-bottom: 10px;
}
button.reset {
    background: #777;
}
label {
    font-size: 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
}
input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 10px;
    font-size: 18px;
}
input[type="checkbox"] {
    transform: scale(1.3);
}
textarea {
    resize: none;
}
.welcome {
    font-size: 18px;
    margin-bottom: 15px;
}
.message {
    color: #b00020;
    font-size: 16px;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<h2>Barback Tip-Out Calculator</h2>

<p class="welcome">
Hi, hope you had a great shift! Please select the barbacks you worked with during your shift.
</p>

<div class="box">
    <label><input type="checkbox" value="Aaron" onchange="handleSelection()"> Aaron</label>
    <label><input type="checkbox" value="Corey" onchange="handleSelection()"> Corey</label>
    <label><input type="checkbox" value="Terris" onchange="handleSelection()"> Terris</label>
    <label><input type="checkbox" value="Eric" onchange="handleSelection()"> Eric</label>
</div>

<div class="box">
    <div id="message" class="message"></div>

    <label id="label1">Select first barback</label>
    <input type="number" id="h1">

    <label id="label2">Select second barback</label>
    <input type="number" id="h2">

    <label>Total Tipout ($)</label>
    <input type="number" id="total">
</div>

<button onclick="calculate()">Calculate Tip-Out</button>
<button class="reset" onclick="resetAll()">Reset for Next Shift</button>

<div class="box" id="results"></div>

<div class="box">
    <h3>Suggestions</h3>
    <textarea id="suggestion" rows="4" placeholder="Have an idea to improve this?"></textarea>
    <button onclick="saveSuggestion()">Save Suggestion</button>
    <p id="savedMsg"></p>
</div>

<script>
function handleSelection() {
    const checkboxes = Array.from(document.querySelectorAll('input[type="checkbox"]'));
    const checked = checkboxes.filter(cb => cb.checked);

    message.innerText = "";

    if (checked.length > 2) {
        event.target.checked = false;
        message.innerText = "You can only select 2 barbacks.";
        return;
    }

    // Auto-clear hours when selection changes
    h1.value = "";
    h2.value = "";

    // Reset labels
    label1.innerText = "Select first barback";
    label2.innerText = "Select second barback";

    if (checked[0]) label1.innerText = `Hours for ${checked[0].value}`;
    if (checked[1]) label2.innerText = `Hours for ${checked[1].value}`;
}

function calculate() {
    const selected = Array.from(
        document.querySelectorAll('input[type="checkbox"]:checked')
    ).map(cb => cb.value);

    message.innerText = "";
    results.innerHTML = "";

    if (selected.length !== 2) {
        message.innerText = "Please select exactly 2 barbacks.";
        return;
    }

    const h1Val = parseFloat(h1.value) || 0;
    const h2Val = parseFloat(h2.value) || 0;
    const totalTip = parseFloat(total.value) || 0;

    if (h1Val + h2Val === 0) {
        message.innerText = "Please enter hours worked.";
        return;
    }

    const rate = totalTip / (h1Val + h2Val);

    let pay1 = rate * h1Val;
    let pay2 = rate * h2Val;

    // Rounding rules
    if (h1Val > h2Val) {
        pay1 = Math.ceil(pay1);
        pay2 = Math.floor(pay2);
    } else if (h2Val > h1Val) {
        pay2 = Math.ceil(pay2);
        pay1 = Math.floor(pay1);
    } else {
        pay1 = Math.round(pay1);
        pay2 = Math.round(pay2);
    }

    results.innerHTML = `
        <p>${selected[0]} gets: $${pay1}</p>
        <p>${selected[1]} gets: $${pay2}</p>
    `;
}

function resetAll() {
    document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
    h1.value = "";
    h2.value = "";
    total.value = "";
    results.innerHTML = "";
    message.innerText = "";
    label1.innerText = "Select first barback";
    label2.innerText = "Select second barback";
}

function saveSuggestion() {
    const text = suggestion.value.trim();
    if (!text) return;

    const list = JSON.parse(localStorage.getItem("suggestions") || "[]");
    list.push({ text, date: new Date().toLocaleString() });
    localStorage.setItem("suggestions", JSON.stringify(list));

    suggestion.value = "";
    savedMsg.innerText = "✅ Suggestion saved on this device";
}
</script>

</body>
</html>
