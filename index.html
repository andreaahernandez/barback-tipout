
<!DOCTYPE html>
<html>
<head>
    <title>Barback Tip-Out</title>

    <!-- Fix tiny text on iPhone -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f4f4f4;
            font-size: 22px;
        }
        .box {
            background: white;
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 18px;
        }
        .barback-row {
            display: flex;
            align-items: center;
            font-size: 22px;
            margin-bottom: 12px;
        }
        .barback-row input[type="checkbox"] {
            margin-right: 12px;
            transform: scale(1.4);
        }
        button {
            width: 100%;
            padding: 16px;
            font-size: 22px;
            background: black;
            color: white;
            border: none;
            border-radius: 10px;
        }
        input[type="number"] { 
            width: 100%; 
            padding: 14px; 
            margin-top: 6px; 
            margin-bottom: 14px; 
            font-size: 22px; 
            background: #c8c8c8;      /* darker input box */
            border: 2px solid #333;   /* darker border */
            border-radius: 8px;
            color: #000;
        }
    </style>
</head>
<body>

    <h2>Barback Tip-Out Calculator</h2>
    <p>Hi! Hope you had a great shift! Please select the barbacks you worked with during your shift.</p>

    <div class="box">
        
           <div class="barback-row">
               <input type="checkbox" id="bbCarl" onchange="updateLabels()">
               <label for="bbCarl>Carl</label>
           </div>

        
        <div class="barback-row">
            <input type="checkbox" id="bbAaron" onchange="updateLabels()">
            <label for="bbAaron">Aaron</label>
        </div>

        <div class="barback-row">
            <input type="checkbox" id="bbCorey" onchange="updateLabels()">
            <label for="bbCorey">Corey</label>
        </div>

        <div class="barback-row">
            <input type="checkbox" id="bbTerris" onchange="updateLabels()">
            <label for="bbTerris">Terris</label>
        </div>

        <div class="barback-row">
            <input type="checkbox" id="bbEric" onchange="updateLabels()">
            <label for="bbEric">Eric</label>
        </div>
    </div>

    <div class="box">
        <label id="labelBb1">Hours for ___</label>
        <input type="number" id="bb1hours">

        <label id="labelBb2">Hours for ___</label>
        <input type="number" id="bb2hours">

        <label>Total Tipout ($)</label>
        <input type="number" id="totaltipout">
    </div>

    <button onclick="calculate()">Calculate Tip-Out</button>

    <button onclick="resetForm()" style="margin-top:12px; background:#777;">
        Reset
    </button>

    <div class="box">
        <p id="result1"></p>
        <p id="result2"></p>
    </div>

<script>
function getSelected() {
    let selected = [];
    if (document.getElementById("bbAaron").checked) selected.push("Aaron");
    if (document.getElementById("bbCorey").checked) selected.push("Corey");
    if (document.getElementById("bbTerris").checked) selected.push("Terris");
    if (document.getElementById("bbEric").checked) selected.push("Eric");
    return selected;
}

function updateLabels() {
    let selected = getSelected();

    document.getElementById("labelBb1").innerText =
        selected[0] ? `Hours for ${selected[0]}` : "Hours for ___";

    document.getElementById("labelBb2").innerText =
        selected[1] ? `Hours for ${selected[1]}` : "Hours for ___";
}

function calculate() {
    let selected = getSelected();
    let bb1 = selected[0] || null;
    let bb2 = selected[1] || null;

    let bb1hours = parseFloat(document.getElementById("bb1hours").value) || 0;
    let bb2hours = parseFloat(document.getElementById("bb2hours").value) || 0;
    let totaltipout = parseFloat(document.getElementById("totaltipout").value) || 0;

    let totalhours = bb1hours + bb2hours;
    let hourly = totaltipout / totalhours;

    let bb1pay = hourly * bb1hours;
    let bb2pay = hourly * bb2hours;

    // ROUNDING RULE:
    // Higher earner rounds UP, lower earner rounds DOWN
    let bb1rounded, bb2rounded;

    if (bb1pay > bb2pay) {
        bb1rounded = Math.ceil(bb1pay);
        bb2rounded = Math.floor(bb2pay);
    } else {
        bb1rounded = Math.floor(bb1pay);
        bb2rounded = Math.ceil(bb2pay);
    }

    document.getElementById("result1").innerText =
        bb1 ? `${bb1} gets: $${bb1rounded}` : "";

    document.getElementById("result2").innerText =
        bb2 ? `${bb2} gets: $${bb2rounded}` : "";
}

function resetForm() {
    document.getElementById("bbAaron").checked = false;
    document.getElementById("bbCorey").checked = false;
    document.getElementById("bbTerris").checked = false;
    document.getElementById("bbEric").checked = false;

    document.getElementById("bb1hours").value = "";
    document.getElementById("bb2hours").value = "";
    document.getElementById("totaltipout").value = "";

    document.getElementById("result1").innerText = "";
    document.getElementById("result2").innerText = "";

    document.getElementById("labelBb1").innerText = "Hours for ___";
    document.getElementById("labelBb2").innerText = "Hours for ___";
}
</script>

</body>
</html>
